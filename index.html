<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyUp</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#dashboard" aria-label="StudyUp Startseite">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M8 12.5c5.7-.9 10.6.2 14 3.1v21.1c-3.4-2.9-8.3-4-14-3.1V12.5Z" />
              <path d="M40 12.5c-5.7-.9-10.6.2-14 3.1v21.1c3.4-2.9 8.3-4 14-3.1V12.5Z" />
              <path d="M24 10v28" />
              <path d="M31 20.5 36 15l5 5.5" />
              <path d="M36 15v12" />
            </svg>
          </span>
          <span><strong>StudyUp</strong><small>StudyUp.com</small></span>
        </a>
        <div class="top-actions">
          <button id="notification-button" class="top-icon-button" type="button" title="Mitteilungen aktivieren">
            <span aria-hidden="true">!</span><span>Mitteilungen</span>
          </button>
          <button id="theme-toggle" class="top-icon-button" type="button" title="Hell- und Dunkelmodus wechseln">
            <span id="theme-icon" aria-hidden="true">&#9790;</span><span id="theme-label">Dunkel</span>
          </button>
          <button id="logout-button" class="top-icon-button" type="button" title="Ausloggen">
            <span aria-hidden="true">&#8634;</span><span>Logout</span>
          </button>
          <div class="sync-state"><span class="status-dot"></span>Lokal gespeichert</div>
        </div>
      </header>
      <main id="app" class="main-content" aria-live="polite"></main>
      <nav class="bottom-nav" aria-label="Hauptnavigation">
        <a href="#dashboard" data-route="dashboard" title="Start"><span class="nav-icon" aria-hidden="true">&#8962;</span><span>Start</span></a>
        <a href="#grades" data-route="grades" title="Noten"><span class="nav-icon" aria-hidden="true">%</span><span>Noten</span></a>
        <a href="#planner" data-route="planner" title="Lernplan"><span class="nav-icon" aria-hidden="true">&#9719;</span><span>Plan</span></a>
        <a href="#cards" data-route="cards" title="Karteikarten"><span class="nav-icon" aria-hidden="true">&#9636;</span><span>Karten</span></a>
        <a href="#bot" data-route="bot" title="StudyUp AI"><span class="nav-icon text-icon" aria-hidden="true">AI</span><span>AI</span></a>
        <a href="#premium" data-route="premium" title="Premium"><span class="nav-icon" aria-hidden="true">&#9733;</span><span>Plus</span></a>
      </nav>
    </div>
    <script src="src/data.js" defer></script>
    <script src="src/storage.js" defer></script>
    <script src="src/components.js" defer></script>
    <script src="src/app.js" defer></script>
  </body>
</html>
