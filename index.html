<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lynxly</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#dashboard" aria-label="Lynxly Startseite">
          <span class="logo brand-logo" aria-hidden="true">
            <img src="src/assets/lynxly-avatar.png" alt="" />
          </span>
          <span class="streak-pill" id="streak-pill" title="Lernserie" aria-label="0 Tage Lernserie">
            <svg class="streak-flame" viewBox="0 0 24 24" aria-hidden="true">
              <path class="flame-main" d="M12.4 2.7c.6 3.1-2.4 4.8-3.8 7.1-.9 1.5-1 3.2.1 4.7.2-2.1 1.6-3.5 3.1-4.7 2.6 2 4.7 4.4 4.7 7.3 0 2.9-2.2 4.9-5.1 4.9S6 20.1 6 16.8c0-4.3 4.5-6.3 6.4-14.1Z" />
              <path class="flame-core" d="M12 13.2c1.3 1.3 2.1 2.4 2.1 3.8 0 1.5-1 2.6-2.3 2.6s-2.4-1-2.4-2.6c0-1.4 1.1-2.5 2.6-3.8Z" />
            </svg>
            <strong id="streak-count">0</strong>
          </span>
          <span class="xp-pill" id="xp-pill" title="XP diese Woche" aria-label="0 XP diese Woche">
            <strong id="xp-week-count">0</strong><span>XP</span>
          </span>
          <span><strong>Lynxly</strong><small>dein smarter Lerncoach</small></span>
        </a>
        <div class="top-actions">
          <button id="theme-toggle" class="theme-icon-button" type="button" title="Hell- und Dunkelmodus wechseln" aria-label="Hell- und Dunkelmodus wechseln">
            <span id="theme-icon" aria-hidden="true">&#9790;</span><span id="theme-label" class="sr-only">Dunkel</span>
          </button>
          <button id="settings-button" class="top-icon-button account-button" type="button" title="Account">
            <span aria-hidden="true">A</span><span>Account</span>
          </button>
        </div>
      </header>
      <main id="app" class="main-content" aria-live="polite"></main>
      <nav class="bottom-nav" aria-label="Hauptnavigation">
        <a href="#dashboard" data-route="dashboard" title="Start"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m3 10 9-7 9 7"/><path d="M5 9.5V21h5v-6h4v6h5V9.5"/></svg></span><span>Start</span></a>
        <a href="#grades" data-route="grades" title="Noten"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m3 8 9-5 9 5-9 5Z"/><path d="M7 10.5V15c2.7 2 7.3 2 10 0v-4.5"/><path d="M21 8v7"/></svg></span><span>Noten</span></a>
        <a href="#planner" data-route="planner" title="Lernplan"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 3v4M17 3v4M4 9h16M5 5h14v15H5z"/></svg></span><span>Plan</span></a>
        <a href="#cards" data-route="cards" title="Karteikarten"><span class="nav-icon nav-icon-wrap cards-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="7" y="4.5" width="11.5" height="14.5" rx="2.3"/><rect x="4" y="7.5" width="11.5" height="14.5" rx="2.3"/><path d="M7.5 11h4.5M7.5 14h3"/></svg><b class="nav-badge" id="cards-nav-badge" hidden>0</b></span><span>Karten</span></a>
        <a href="#bot" data-route="bot" title="Lynxly AI"><span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 9.5 9.5 3 12l6.5 2.5L12 21l2.5-6.5L21 12l-6.5-2.5z"/><path d="M19 3v4M17 5h4"/></svg></span><span>KI</span></a>
      </nav>
      <a class="progress-fab" id="progress-fab" href="#progress" aria-label="Fortschritt und Leaderboards öffnen" title="Fortschritt">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 19V5" />
          <path d="M4 19h16" />
          <path d="m8 15 3-4 3 2 4-6" />
          <path d="M17 7h1v1" />
        </svg>
        <span>Fortschritt</span>
      </a>
      <div class="xp-toast-layer" id="xp-toast-layer" aria-hidden="true"></div>
      <div class="sr-only" id="xp-live" aria-live="polite" aria-atomic="true"></div>
    </div>
    <script src="src/data.js" defer></script>
    <script src="src/storage.js" defer></script>
    <script src="src/components.js" defer></script>
    <script src="src/app.js" defer></script>
  </body>
</html>
